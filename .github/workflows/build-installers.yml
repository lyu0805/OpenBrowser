name: Build OpenBrowser installers

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create, for example v1.0.1'
        required: true
        default: 'v1.0.1'
      prerelease:
        description: 'Mark the GitHub Release as a prerelease'
        required: false
        type: boolean
        default: false

concurrency:
  group: openbrowser-installers-${{ inputs.release_tag }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.release_tag }}
  GH_TOKEN: ${{ github.token }}
  RELEASE_NOTES: |
    ## OpenBrowser ${{ inputs.release_tag }}

    - 修复若干问题，优化稳定性。
    - 优化跨平台封装与发行版上传流程。
    - Windows x64 与 macOS arm64 分别提供“内置内核”和“未内置内核”两种安装包；macOS x86_64 保持单独的内置 OpenBrowser 148 内核版本。所有平台默认不会自动回退到本机浏览器，需在“本地设置”手动选择并开启回退。
    - Fixed several issues and improved stability.
    - Improved cross-platform packaging and release upload flow.
    - Windows x64 and macOS arm64 each provide bundled-kernel and kernel-free packages; macOS x86_64 remains the separate package with its built-in OpenBrowser 148 kernel. All platforms keep system-browser fallback off by default and require manual selection and enablement in “Local Settings”.

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "release_tag must start with v, got: $RELEASE_TAG" >&2; exit 1 ;;
          esac
      - name: Check out source
        uses: actions/checkout@v4
      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/openbrowser-release-notes.md"
          printf '%s\n' "$RELEASE_NOTES" > "$notes_file"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            edit_args=("$RELEASE_TAG" --title "OpenBrowser $RELEASE_TAG" --notes-file "$notes_file")
            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              edit_args+=(--prerelease)
            fi
            gh release edit "${edit_args[@]}"
          else
            args=("$RELEASE_TAG" --target "$GITHUB_SHA" --title "OpenBrowser $RELEASE_TAG" --notes-file "$notes_file")
            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh release create "${args[@]}"
          fi

  macos-arm64:
    name: macOS arm64
    needs: prepare-release
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        variant: [with-kernel, without-kernel]
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: arm64
      OPENBROWSER_PACKAGE_VARIANT: ${{ matrix.variant }}
      OPENBROWSER_BUNDLE_KERNEL: ${{ matrix.variant == 'with-kernel' && 'true' || 'false' }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: false
          sparse-checkout: |
            /*
            !/Browserapp/kernels/
          sparse-checkout-cone-mode: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Prepare bundled macOS arm64 kernel
        if: ${{ matrix.variant == 'with-kernel' }}
        run: npm run prepare:bundled-kernel
      - name: Prepare release notes
        run: printf '%s\n' "$RELEASE_NOTES" > "$RUNNER_TEMP/openbrowser-release-notes.md"
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package
        run: npm run package:portable
      - name: Verify package
        run: |
          set -euo pipefail
          PACKAGE_STEM="OpenBrowser-macOS-arm64-${OPENBROWSER_PACKAGE_VARIANT}"
          APP="dist/${PACKAGE_STEM}/OpenBrowser.app/Contents/Resources/app"
          if [[ "$OPENBROWSER_PACKAGE_VARIANT" == "with-kernel" ]]; then
            test -d "$APP/bundled-kernels/wayfern"
          else
            test ! -e "$APP/bundled-kernels"
          fi
          test -f "dist/${PACKAGE_STEM}.dmg"
      - name: Upload package to release
        run: bash scripts/publish-release.sh "$RELEASE_TAG" "$RUNNER_TEMP/openbrowser-release-notes.md" "dist/OpenBrowser-macOS-arm64-${OPENBROWSER_PACKAGE_VARIANT}.dmg"

  macos-x86_64:
    name: macOS x86_64
    needs: prepare-release
    runs-on: macos-15-intel
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: x86_64
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Require bundled runtime tree
        run: |
          set -euo pipefail
          test -f "kernels/openbrowser/chrome_148/openbrowser_148/OpenBrowser.app/Contents/MacOS/OpenBrowser"
          chmod +x "kernels/openbrowser/chrome_148/openbrowser_148/OpenBrowser.app/Contents/MacOS/OpenBrowser" || true
          chmod +x "kernels/openbrowser/chrome_148/openbrowser_148/OpenBrowser.app/Contents/MacOS/OpenBrowser.bin" || true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Prepare release notes
        run: printf '%s\n' "$RELEASE_NOTES" > "$RUNNER_TEMP/openbrowser-release-notes.md"
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package
        run: npm run package:portable
      - name: Verify package
        run: |
          set -euo pipefail
          APP="dist/OpenBrowser-macOS-x86_64/OpenBrowser.app/Contents/Resources/app"
          test -f "$APP/kernels/openbrowser/chrome_148/openbrowser_148/OpenBrowser.app/Contents/MacOS/OpenBrowser"
          test -f "dist/OpenBrowser-macOS-x86_64.dmg"
      - name: Upload package to release
        run: bash scripts/publish-release.sh "$RELEASE_TAG" "$RUNNER_TEMP/openbrowser-release-notes.md" "dist/OpenBrowser-macOS-x86_64.dmg"

  windows-x86_64:
    name: Windows x86_64
    needs: prepare-release
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        variant: [with-kernel, without-kernel]
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: x86_64
      OPENBROWSER_PACKAGE_VARIANT: ${{ matrix.variant }}
      OPENBROWSER_BUNDLE_KERNEL: ${{ matrix.variant == 'with-kernel' && 'true' || 'false' }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: false
          sparse-checkout: |
            /*
            !/Browserapp/kernels/
          sparse-checkout-cone-mode: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Prepare bundled Windows x64 kernel
        if: ${{ matrix.variant == 'with-kernel' }}
        run: npm run prepare:bundled-kernel
      - name: Prepare release notes
        shell: bash
        run: printf '%s\n' "$RELEASE_NOTES" > "$RUNNER_TEMP/openbrowser-release-notes.md"
      - name: Install NSIS
        run: choco install nsis --no-progress --yes
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package
        run: npm run package:portable
      - name: Verify package
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_STEM="OpenBrowser-Windows-x86_64-${OPENBROWSER_PACKAGE_VARIANT}"
          APP="dist/${PACKAGE_STEM}/runtime/resources/app"
          if [[ "$OPENBROWSER_PACKAGE_VARIANT" == "with-kernel" ]]; then
            test -d "$APP/bundled-kernels/wayfern"
          else
            test ! -e "$APP/bundled-kernels"
          fi
          test -f "dist/${PACKAGE_STEM}.exe"
          test -f "dist/${PACKAGE_STEM}.zip"
      - name: Upload package to release
        shell: bash
        run: bash scripts/publish-release.sh "$RELEASE_TAG" "$RUNNER_TEMP/openbrowser-release-notes.md" "dist/OpenBrowser-Windows-x86_64-${OPENBROWSER_PACKAGE_VARIANT}.exe" "dist/OpenBrowser-Windows-x86_64-${OPENBROWSER_PACKAGE_VARIANT}.zip"
