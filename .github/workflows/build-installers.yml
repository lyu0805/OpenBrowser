name: Build OpenBrowser installers

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create, for example v1.0.1'
        required: true
        default: 'v1.0.1'
      prerelease:
        description: 'Mark the GitHub Release as a prerelease'
        required: false
        type: boolean
        default: false
      target_platform:
        description: 'Package target (default all = kernel-integrated only)'
        required: false
        type: choice
        default: all
        options:
          - all
          - macos-arm64
          - macos-x86_64
          - windows-x86_64
          - macos-arm64-without-kernel
          - windows-x86_64-without-kernel

concurrency:
  group: openbrowser-installers-${{ inputs.release_tag }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.release_tag }}
  GH_TOKEN: ${{ github.token }}
  # Product default: only kernel-integrated packages unless a job opts out.
  OPENBROWSER_PACKAGE_VARIANT: with-kernel
  OPENBROWSER_BUNDLE_KERNEL: 'true'
  RELEASE_NOTES: |
    ## OpenBrowser ${{ inputs.release_tag }}

    - 修复若干问题，优化稳定性。
    - 独立内核扁平内置于 `Browserapp/kernels/{macos-x64,windows-x64,macos-arm64}`，运行时不再自动下载。
    - 默认只发布**内置内核**安装包（`kernels/{macos-x64,windows-x64,macos-arm64}`），运行时不再自动下载。
    - Fixed several issues and improved stability.
    - Default release ships **kernel-integrated** packages only; runtime never auto-downloads kernels.

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "release_tag must start with v, got: $RELEASE_TAG" >&2; exit 1 ;;
          esac
      - name: Check out source
        uses: actions/checkout@v4
      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/openbrowser-release-notes.md"
          printf '%s\n' "$RELEASE_NOTES" > "$notes_file"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            edit_args=("$RELEASE_TAG" --title "OpenBrowser $RELEASE_TAG" --notes-file "$notes_file")
            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              edit_args+=(--prerelease)
            fi
            gh release edit "${edit_args[@]}"
          else
            args=("$RELEASE_TAG" --target "$GITHUB_SHA" --title "OpenBrowser $RELEASE_TAG" --notes-file "$notes_file")
            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh release create "${args[@]}"
          fi

  macos-arm64-with-kernel:
    name: macOS arm64 (integrated kernel)
    if: ${{ inputs.target_platform == 'all' || inputs.target_platform == 'macos-arm64' || inputs.target_platform == 'macos-arm64-with-kernel' }}
    needs: prepare-release
    runs-on: macos-14
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: arm64
      OPENBROWSER_PACKAGE_VARIANT: with-kernel
      OPENBROWSER_BUNDLE_KERNEL: 'true'
      OPENBROWSER_MAC_DMG_FORMAT: ULMO
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: true
          sparse-checkout: |
            /*
            !/Browserapp/kernels/macos-x64/
            !/Browserapp/kernels/openbrowser/
            !/Browserapp/kernels/windows-x64/
          sparse-checkout-cone-mode: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Verify integrated macOS arm64 kernel seed
        run: |
          test -x kernels/macos-arm64/Wayfern.app/Contents/MacOS/Wayfern
          npm run prepare:bundled-kernel
      - name: Prepare release notes
        run: printf '%s\n' "$RELEASE_NOTES" > "$RUNNER_TEMP/openbrowser-release-notes.md"
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package
        run: npm run package:portable
      - name: Verify package
        run: |
          set -euo pipefail
          APP="dist/OpenBrowser-macOS-arm64-with-kernel/OpenBrowser.app/Contents/Resources/app"
          test -x "$APP/kernels/macos-arm64/Wayfern.app/Contents/MacOS/Wayfern"
          test ! -e "$APP/bundled-kernels"
          test ! -e "$APP/kernels/macos-x64"
          test ! -e "$APP/kernels/openbrowser"
          test ! -e "$APP/kernels/windows-x64"
          test -f "dist/OpenBrowser-macOS-arm64-with-kernel.dmg"
      - name: Upload package to release
        run: bash scripts/publish-release.sh "$RELEASE_TAG" "$RUNNER_TEMP/openbrowser-release-notes.md" "dist/OpenBrowser-macOS-arm64-with-kernel.dmg"

  macos-arm64-without-kernel:
    name: macOS arm64 without integrated kernel
    if: ${{ inputs.target_platform == 'macos-arm64-without-kernel' }}
    needs: prepare-release
    runs-on: macos-14
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: arm64
      OPENBROWSER_PACKAGE_VARIANT: without-kernel
      OPENBROWSER_BUNDLE_KERNEL: 'false'
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: false
          sparse-checkout: |
            /*
            !/Browserapp/kernels/
          sparse-checkout-cone-mode: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Prepare release notes
        run: printf '%s\n' "$RELEASE_NOTES" > "$RUNNER_TEMP/openbrowser-release-notes.md"
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package
        run: npm run package:portable
      - name: Verify package
        run: |
          set -euo pipefail
          APP="dist/OpenBrowser-macOS-arm64-without-kernel/OpenBrowser.app/Contents/Resources/app"
          test ! -e "$APP/bundled-kernels"
          test ! -e "$APP/kernels/macos-arm64"
          test ! -e "$APP/kernels/windows-x64"
          test ! -e "$APP/kernels/macos-x64"
          test ! -e "$APP/kernels/wayfern"
          test -f "dist/OpenBrowser-macOS-arm64-without-kernel.dmg"
      - name: Upload package to release
        run: bash scripts/publish-release.sh "$RELEASE_TAG" "$RUNNER_TEMP/openbrowser-release-notes.md" "dist/OpenBrowser-macOS-arm64-without-kernel.dmg"

  macos-x86_64:
    name: macOS x86_64
    if: ${{ inputs.target_platform == 'all' || inputs.target_platform == 'macos-x86_64' }}
    needs: prepare-release
    runs-on: macos-15-intel
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: x86_64
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: true
          sparse-checkout: |
            /*
            !/Browserapp/kernels/windows-x64/
            !/Browserapp/kernels/macos-arm64/
            !/Browserapp/kernels/wayfern/
          sparse-checkout-cone-mode: false
      - name: Require integrated macos-x64 kernel
        run: |
          set -euo pipefail
          BIN="kernels/macos-x64/chrome_148/openbrowser_148/OpenBrowser.app/Contents/MacOS/OpenBrowser"
          if [ ! -f "$BIN" ]; then
            BIN="kernels/openbrowser/chrome_148/openbrowser_148/OpenBrowser.app/Contents/MacOS/OpenBrowser"
          fi
          test -f "$BIN"
          chmod +x "$BIN" || true
          chmod +x "${BIN}.bin" 2>/dev/null || true
          npm run prepare:bundled-kernel
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Prepare release notes
        run: printf '%s\n' "$RELEASE_NOTES" > "$RUNNER_TEMP/openbrowser-release-notes.md"
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package
        run: npm run package:portable
      - name: Verify package
        run: |
          set -euo pipefail
          APP="dist/OpenBrowser-macOS-x86_64/OpenBrowser.app/Contents/Resources/app"
          test -f "$APP/kernels/macos-x64/chrome_148/openbrowser_148/OpenBrowser.app/Contents/MacOS/OpenBrowser" \
            || test -f "$APP/kernels/openbrowser/chrome_148/openbrowser_148/OpenBrowser.app/Contents/MacOS/OpenBrowser"
          test ! -e "$APP/kernels/windows-x64"
          test ! -e "$APP/kernels/macos-arm64"
          test -f "dist/OpenBrowser-macOS-x86_64.dmg"
      - name: Upload package to release
        run: bash scripts/publish-release.sh "$RELEASE_TAG" "$RUNNER_TEMP/openbrowser-release-notes.md" "dist/OpenBrowser-macOS-x86_64.dmg"

  windows-x86_64-with-kernel:
    name: Windows x86_64 (integrated kernel)
    if: ${{ inputs.target_platform == 'all' || inputs.target_platform == 'windows-x86_64' || inputs.target_platform == 'windows-x86_64-with-kernel' }}
    needs: prepare-release
    runs-on: windows-2022
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: x86_64
      OPENBROWSER_PACKAGE_VARIANT: with-kernel
      OPENBROWSER_BUNDLE_KERNEL: 'true'
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: true
          sparse-checkout: |
            /*
            !/Browserapp/kernels/macos-x64/
            !/Browserapp/kernels/openbrowser/
            !/Browserapp/kernels/macos-arm64/
          sparse-checkout-cone-mode: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Verify integrated Windows x64 kernel seed
        shell: bash
        run: |
          test -f kernels/windows-x64/chrome.exe
          test -f kernels/windows-x64/chrome.dll
          npm run prepare:bundled-kernel
      - name: Prepare release notes
        shell: bash
        run: printf '%s\n' "$RELEASE_NOTES" > "$RUNNER_TEMP/openbrowser-release-notes.md"
      - name: Install NSIS
        run: choco install nsis --no-progress --yes
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package
        run: npm run package:portable
      - name: Verify package
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_STEM="OpenBrowser-Windows-x86_64-with-kernel"
          APP="dist/${PACKAGE_STEM}/runtime/resources/app"
          test -f "$APP/kernels/windows-x64/chrome.exe"
          test -f "$APP/kernels/windows-x64/chrome.dll"
          test ! -e "$APP/bundled-kernels"
          test ! -e "$APP/kernels/macos-x64"
          test ! -e "$APP/kernels/openbrowser"
          test ! -e "$APP/kernels/macos-arm64"
          test -f "dist/${PACKAGE_STEM}.exe"
          test -f "dist/${PACKAGE_STEM}.zip"
      - name: Upload package to release
        shell: bash
        run: bash scripts/publish-release.sh "$RELEASE_TAG" "$RUNNER_TEMP/openbrowser-release-notes.md" "dist/OpenBrowser-Windows-x86_64-with-kernel.exe" "dist/OpenBrowser-Windows-x86_64-with-kernel.zip"

  windows-x86_64-without-kernel:
    name: Windows x86_64 without integrated kernel
    if: ${{ inputs.target_platform == 'windows-x86_64-without-kernel' }}
    needs: prepare-release
    runs-on: windows-2022
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: x86_64
      OPENBROWSER_PACKAGE_VARIANT: without-kernel
      OPENBROWSER_BUNDLE_KERNEL: 'false'
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: false
          sparse-checkout: |
            /*
            !/Browserapp/kernels/
          sparse-checkout-cone-mode: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Prepare release notes
        shell: bash
        run: printf '%s\n' "$RELEASE_NOTES" > "$RUNNER_TEMP/openbrowser-release-notes.md"
      - name: Install NSIS
        run: choco install nsis --no-progress --yes
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package
        run: npm run package:portable
      - name: Verify package
        shell: bash
        run: |
          set -euo pipefail
          APP="dist/OpenBrowser-Windows-x86_64-without-kernel/runtime/resources/app"
          test ! -e "$APP/bundled-kernels"
          test ! -e "$APP/kernels/windows-x64"
          test ! -e "$APP/kernels/macos-arm64"
          test ! -e "$APP/kernels/macos-x64"
          test ! -e "$APP/kernels/wayfern"
          test -f "dist/OpenBrowser-Windows-x86_64-without-kernel.exe"
          test -f "dist/OpenBrowser-Windows-x86_64-without-kernel.zip"
      - name: Upload package to release
        shell: bash
        run: bash scripts/publish-release.sh "$RELEASE_TAG" "$RUNNER_TEMP/openbrowser-release-notes.md" "dist/OpenBrowser-Windows-x86_64-without-kernel.exe" "dist/OpenBrowser-Windows-x86_64-without-kernel.zip"
