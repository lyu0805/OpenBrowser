name: Build OpenBrowser installers

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create, for example v1.0.0'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Mark the GitHub Release as a prerelease'
        required: false
        type: boolean
        default: false

concurrency:
  group: openbrowser-installers-${{ inputs.release_tag }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  macos-x86_64:
    name: macOS x86_64
    runs-on: macos-13
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: x86_64
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package
        run: npm run package:portable
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: OpenBrowser-macOS-x86_64
          path: Browserapp/dist/OpenBrowser-macOS-x86_64.dmg
          if-no-files-found: error

  macos-arm64:
    name: macOS arm64
    runs-on: macos-14
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: arm64
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package
        run: npm run package:portable
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: OpenBrowser-macOS-arm64
          path: Browserapp/dist/OpenBrowser-macOS-arm64.dmg
          if-no-files-found: error

  windows-x86_64:
    name: Windows x86_64
    runs-on: windows-2022
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: x86_64
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Install NSIS
        run: choco install nsis --no-progress --yes
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package
        run: npm run package:portable
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: OpenBrowser-Windows-x86_64
          path: |
            Browserapp/dist/OpenBrowser-Windows-x86_64.exe
            Browserapp/dist/OpenBrowser-Windows-x86_64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [macos-x86_64, macos-arm64, windows-x86_64]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate release tag
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "release_tag must start with v, got: $RELEASE_TAG" >&2; exit 1 ;;
          esac
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: OpenBrowser-*
          path: release-assets
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: OpenBrowser ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/*
          fail_on_unmatched_files: true
