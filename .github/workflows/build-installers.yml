name: Build OpenBrowser installers

# 内核打包约定（与 scripts/package-portable.js appResourceExcludes 一致）：
# - openbrowser-148（Browserapp/kernels/openbrowser）仅适用于 macOS x86_64（Intel）
# - 仅 macos-x86_64 job 打入该内核，并作为该架构默认独立内核（无需再下 Wayfern/CfT）
# - macos-arm64 / windows-x86_64 等产物必须排除 kernels/，不得打入 148
# - 本 workflow 各 job 的 OPENBROWSER_PACKAGE_ARCH 决定 package-portable 是否 copy kernels/

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create, for example v1.0.0'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Mark the GitHub Release as a prerelease'
        required: false
        type: boolean
        default: false

concurrency:
  group: openbrowser-installers-${{ inputs.release_tag }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  macos-x86_64:
    name: macOS x86_64
    # Intel runner：与 OPENBROWSER_PACKAGE_ARCH=x86_64 一致，打入 openbrowser-148 默认内核
    runs-on: macos-13
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: x86_64
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          # 若内核走 Git LFS，需拉实体文件
          lfs: true
      - name: Require openbrowser-148 kernel tree (macOS x86_64 only)
        run: |
          set -euo pipefail
          K="kernels/openbrowser/chrome_148/openbrowser_148/OpenBrowser.app/Contents/MacOS/OpenBrowser"
          if [[ ! -f "$K" ]]; then
            echo "ERROR: 缺少 macOS x86_64 默认内核：$K" >&2
            echo "openbrowser-148 必须在源码树 Browserapp/kernels/openbrowser 中（仅该架构打包/默认启用）。" >&2
            exit 1
          fi
          chmod +x "$K" || true
          chmod +x "kernels/openbrowser/chrome_148/openbrowser_148/OpenBrowser.app/Contents/MacOS/OpenBrowser.bin" || true
          echo "OK default kernel present for macOS x86_64: $K"
          du -sh kernels/openbrowser
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package (must embed kernels/openbrowser)
        run: npm run package:portable
      - name: Verify package embeds openbrowser-148 only for this arch
        run: |
          set -euo pipefail
          APP="dist/OpenBrowser-macOS-x86_64/OpenBrowser.app/Contents/Resources/app"
          K="$APP/kernels/openbrowser/chrome_148/openbrowser_148/OpenBrowser.app/Contents/MacOS/OpenBrowser"
          if [[ ! -f "$K" ]]; then
            echo "ERROR: 打包结果未包含 openbrowser-148 默认内核：$K" >&2
            ls -la "$APP" || true
            ls -la "$APP/kernels" || true
            exit 1
          fi
          echo "OK embedded default kernel: $K"
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: OpenBrowser-macOS-x86_64
          path: Browserapp/dist/OpenBrowser-macOS-x86_64.dmg
          if-no-files-found: error

  macos-arm64:
    name: macOS arm64
    # Apple Silicon：禁止打入 openbrowser-148（x86 内核）
    runs-on: macos-14
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: arm64
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package (must exclude kernels/)
        run: npm run package:portable
      - name: Verify package excludes openbrowser-148
        run: |
          set -euo pipefail
          APP="dist/OpenBrowser-macOS-arm64/OpenBrowser.app/Contents/Resources/app"
          if [[ -d "$APP/kernels" ]]; then
            echo "ERROR: macOS arm64 包不应包含 kernels/（openbrowser-148 仅 macOS x86_64）" >&2
            find "$APP/kernels" -maxdepth 3 -type f 2>/dev/null | head -20
            exit 1
          fi
          echo "OK kernels/ excluded from macOS arm64 package"
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: OpenBrowser-macOS-arm64
          path: Browserapp/dist/OpenBrowser-macOS-arm64.dmg
          if-no-files-found: error

  windows-x86_64:
    name: Windows x86_64
    # Windows：禁止打入 openbrowser-148
    runs-on: windows-2022
    defaults:
      run:
        working-directory: Browserapp
    env:
      OPENBROWSER_PACKAGE_ARCH: x86_64
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Browserapp/package-lock.json
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Install NSIS
        run: choco install nsis --no-progress --yes
      - name: Run self-tests
        run: |
          npm run selftest
          npm run selftest:automation
          npm run selftest:protocol
          npm run selftest:isolation
          npm run selftest:kernel
      - name: Package (must exclude kernels/)
        run: npm run package:portable
      - name: Verify package excludes openbrowser-148
        shell: bash
        run: |
          set -euo pipefail
          APP="dist/OpenBrowser-Windows-x86_64/runtime/resources/app"
          if [[ -d "$APP/kernels" ]]; then
            echo "ERROR: Windows 包不应包含 kernels/（openbrowser-148 仅 macOS x86_64）" >&2
            find "$APP/kernels" -maxdepth 3 -type f 2>/dev/null | head -20
            exit 1
          fi
          echo "OK kernels/ excluded from Windows package"
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: OpenBrowser-Windows-x86_64
          path: |
            Browserapp/dist/OpenBrowser-Windows-x86_64.exe
            Browserapp/dist/OpenBrowser-Windows-x86_64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [macos-x86_64, macos-arm64, windows-x86_64]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate release tag
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "release_tag must start with v, got: $RELEASE_TAG" >&2; exit 1 ;;
          esac
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: OpenBrowser-*
          path: release-assets
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: OpenBrowser ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/*
          fail_on_unmatched_files: true
